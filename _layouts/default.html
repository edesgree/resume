<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>
   
        {% if site.logo %}
          <img src="{{site.logo | relative_url}}" alt="Logo" />
        {% endif %}
      
        {% if site.image %}
          <img src="{{site.image | relative_url}}" alt="Profile Picture" />
        {% endif %}

          <p><a href="{{ site.baseurl }}/" title="Français">🇫🇷</a>  <a href="{{ site.baseurl }}/en" title="English">🇬🇧</a></p>
        <p>{{ site.description | default: site.github.project_tagline }}</p>

        <p>
            {% if page.lang == 'en' %}
            <a href="{{ site.baseurl }}/pdf/cv-edouard-desgree-2026-en.pdf" target="_blank">[⬇ PDF]</a>
            {% else %}
            <a href="{{ site.baseurl }}/pdf/cv-edouard-desgree-2026-fr.pdf" target="_blank">[⬇ PDF]</a>
            {% endif %}
        </p>
      </header>
      <section>

      {{ content }}

      </section>
  
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
